name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  OPENSPEC_VERSION: "1.3.1"

jobs:
  posix:
    name: POSIX validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install validation tools
        run: |
          npm install --global "@fission-ai/openspec@${OPENSPEC_VERSION}"
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate
        run: ./scripts/validate.sh

  windows:
    name: Windows validation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenSpec
        shell: pwsh
        run: npm install --global "@fission-ai/openspec@$env:OPENSPEC_VERSION"

      - name: Install ShellCheck
        shell: pwsh
        run: choco install shellcheck -y --no-progress

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Validate
        shell: pwsh
        run: ./scripts/validate.ps1
