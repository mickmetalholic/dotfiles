hosts:
  win-desktop:
    os: windows
    purpose: desktop
    shell: pwsh
    terminal: windows-terminal
    installGuiApps: true

  macbook-pro:
    os: darwin
    purpose: personal-laptop
    shell: zsh
    terminal: ghostty
    installGuiApps: true

  work-mac:
    os: darwin
    purpose: work
    shell: zsh
    terminal: ghostty
    installGuiApps: false
    devops:
      docker: true
      kubernetes: none

  linux-devbox:
    os: linux
    purpose: devbox
    shell: zsh
    terminal: wezterm
    installGuiApps: false
    devops:
      docker: true
      kubernetes: k3s
